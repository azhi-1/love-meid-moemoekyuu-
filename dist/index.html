// mvu-adapter.jsx
// 数据流适配层：把 MVU schema (中文键) 翻译成前端组件期望的形态 (英文键)
//
//   stat_data ─┐
//              │
//              ▼
//   adaptStatData() ──► front-end data (system / organizations / characters / posts)
//
// 兼容策略：
//   - 在酒馆助手 iframe 内：通过 Mvu.getMvuData 抓取当前楼层 stat_data
//   - 在本地浏览器测试 (file:// 或 python http.server)：检测不到 Mvu 接口，回退 window.MOCK_DATA
//   - 任意一步失败：打印 warn 后兜底，前端组件不感知
//
// 整个 loadData 暴露成 window.loadData，App 组件用 useEffect 调用。

// ─────────────────────────────────────────────────────────────────────────────
// adaptStatData: 中文 schema → 英文前端形态
// ─────────────────────────────────────────────────────────────────────────────
function adaptStatData(stat) {
  if (!stat) return null;

  return {
    system: {
      date:     _.get(stat, '系统变量.日期', ''),
      time:     _.get(stat, '系统变量.时间', ''),
      location: _.get(stat, '系统变量.当前位置', ''),
    },

    organizations: _.mapValues(_.get(stat, '组织表', {}), org => ({
      territory: _.get(org, '势力范围', ''),
      status:    _.get(org, '当前状态', ''),
      color:     _.get(org, 'color', '#D9773E'),
    })),

    characters: _.mapValues(_.get(stat, '角色表', {}), char => ({
      organization: _.get(char, '所属组织', ''),
      rank:         _.get(char, '职级', ''),
      affection:    _.get(char, '好感度', 0),
      relation:     _.get(char, '关系', '陌生人'),
      location:     _.get(char, '当前位置', ''),
      color:        _.get(char, 'color', '#888888'),
    })),

    posts: _.get(stat, '帖子流', []).map((post, i) => ({
      id:         i + 1,
      type:       _.get(post, '帖子类型', 'character_post'),
      author:     _.get(post, '作者', ''),
      color:      _.get(post, 'color', '#D9773E'),
      rank:       _.get(post, '职级', ''),
      timestamp:  _.get(post, '时间戳', ''),
      location:   _.get(post, '当前位置', ''),
      content:    _.get(post, '帖子内容', ''),
      trajectory: _.get(post, '活动轨迹', []),
      replies:    _.get(post, '回帖', []).map(r => ({
        author:  _.get(r, 'character_reply', ''),
        color:   _.get(r, 'color', '#888888'),
        content: _.get(r, '回帖内容', ''),
      })),
    })),
  };
}
window.adaptStatData = adaptStatData;

// ─────────────────────────────────────────────────────────────────────────────
// loadData: 主入口，返回 Promise<frontEndData>
// ─────────────────────────────────────────────────────────────────────────────
async function loadData({ timeoutMs = 3000 } = {}) {
  const hasMvu =
    typeof Mvu !== 'undefined' &&
    typeof waitGlobalInitialized === 'function' &&
    typeof waitUntil === 'function' &&
    typeof getVariables === 'function' &&
    typeof getCurrentMessageId === 'function';

  if (!hasMvu) {
    console.info('[mvu-adapter] MVU 接口不可用 (本地预览或非酒馆环境)，使用 MOCK_DATA');
    return window.MOCK_DATA;
  }

  try {
    await waitGlobalInitialized('Mvu');
    await waitUntil(
      () => _.has(getVariables({ type: 'message' }), 'stat_data'),
      { timeout: timeoutMs },
    );

    const variables = Mvu.getMvuData({
      type: 'message',
      message_id: getCurrentMessageId(),
    });
    const stat = _.get(variables, 'stat_data');

    if (!stat) throw new Error('stat_data is empty');

    const adapted = adaptStatData(stat);
    console.info('[mvu-adapter] MVU 数据加载完成', adapted);
    return adapted;
  } catch (e) {
    console.warn('[mvu-adapter] 抓取 MVU 失败，回退到 MOCK_DATA：', e);
    return window.MOCK_DATA;
  }
}
window.loadData = loadData;

// ─────────────────────────────────────────────────────────────────────────────
// subscribeMvuUpdates: 监听 MVU 变量变化，触发回调（供 App 实现自动刷新）
// 在非酒馆环境中是 no-op，返回一个空 dispose 函数
// ─────────────────────────────────────────────────────────────────────────────
function subscribeMvuUpdates(onUpdate) {
  const hasMvuEvents =
    typeof Mvu !== 'undefined' &&
    Mvu.events &&
    typeof eventOn === 'function' &&
    typeof eventRemoveListener === 'function';

  if (!hasMvuEvents) return () => {};

  const handler = (newVars) => {
    try {
      const stat = _.get(newVars, 'stat_data');
      if (stat) onUpdate(adaptStatData(stat));
    } catch (e) {
      console.warn('[mvu-adapter] VARIABLE_UPDATE_ENDED 处理失败：', e);
    }
  };

  eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, handler);
  return () => eventRemoveListener(Mvu.events.VARIABLE_UPDATE_ENDED, handler);
}
window.subscribeMvuUpdates = subscribeMvuUpdates;

</script>

// --- Typing animation hook ---
function useTypingEffect(text, speed = 30, trigger = true) {
  const [displayed, setDisplayed] = React.useState('');
  const [done, setDone] = React.useState(false);

  React.useEffect(() => {
    if (!trigger) { setDisplayed(''); setDone(false); return; }
    setDisplayed('');
    setDone(false);
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i >= text.length) { clearInterval(iv); setDone(true); }
    }, speed);
    return () => clearInterval(iv);
  }, [text, speed, trigger]);

  return [displayed, done];
}
window.useTypingEffect = useTypingEffect;

// --- Blinking cursor component ---
function BlinkCursor({ color = '#D9773E' }) {
  const [on, setOn] = React.useState(true);
  React.useEffect(() => {
    const iv = setInterval(() => setOn(v => !v), 530);
    return () => clearInterval(iv);
  }, []);
  return React.createElement('span', {
    style: { color, opacity: on ? 1 : 0, fontWeight: 'bold' }
  }, '█');
}
window.BlinkCursor = BlinkCursor;

// --- Relation color mapping ---
function getRelationColor(relation) {
  const map = {
    '陌生人': '#666666',
    '相识': '#7EB8DA',
    '朋友': '#98C379',
    '挚友': '#E5C07B',
    '恋人': '#E06C75'
  };
  return map[relation] || '#888';
}
window.getRelationColor = getRelationColor;

// --- Affection bar ---
function AffectionBar({ value, max = 100 }) {
  const filled = Math.round((value / max) * 20);
  const empty = 20 - filled;
  const color = value > 80 ? '#E06C75' : value > 60 ? '#E5C07B' : value > 40 ? '#98C379' : '#7EB8DA';
  return React.createElement('span', { style: { fontFamily: 'monospace' } },
    React.createElement('span', { style: { color } }, '█'.repeat(filled)),
    React.createElement('span', { style: { color: '#333' } }, '░'.repeat(empty)),
    React.createElement('span', { style: { color: '#888', marginLeft: '4px' } }, `${value}/${max}`)
  );
}
window.AffectionBar = AffectionBar;

// --- Rank style map: 按职级关键字匹配差异化样式 ---
// 顺序敏感：先特殊后通用，第一个命中即返回
const RANK_STYLE = [
  { match: /SYSTEM|系统播报|播报/i, icon: '⚡', accent: '#E5C07B', pulse: true,  invertBg: true },
  { match: /头目|老大|店长|店主|经营者/,    icon: '♛', accent: '#E5C07B', pulse: false },
  { match: /No\.\s*1|首席|ACE/i,            icon: '★', accent: '#E5C07B', pulse: false },
  { match: /武斗派|打手|護衛|护卫/,          icon: '✊', accent: '#FF6B6B', pulse: false },
  { match: /军师|参謀|参谋/,                icon: '♜', accent: '#C678DD', pulse: false },
  { match: /副手|二把手|秘书|干部|幹部/,    icon: '◇', accent: '#C678DD', pulse: false },
  { match: /情报屋|情報屋|内线|間者|探/,    icon: '✦', accent: '#7EB8DA', pulse: false },
  { match: /新人|見習|见习/,                icon: '◦', accent: '#98C379', pulse: false },
];

function getRankStyle(rank) {
  if (!rank) return null;
  return RANK_STYLE.find(s => s.match.test(rank)) || null;
}
window.getRankStyle = getRankStyle;

// --- RankBadge: 统一徽章渲染组件 ---
// rank: 职级文本; fallbackColor: 默认背景色（通常为作者color）; bracket: 是否包【】
function RankBadge({ rank, fallbackColor, bracket = false }) {
  if (!rank) return null;
  const style = getRankStyle(rank);
  const text = bracket ? `【${rank}】` : rank;

  // 默认（无映射命中）：维持原有外观
  if (!style) {
    return React.createElement('span', {
      style: {
        color: '#0D0D0D', background: fallbackColor,
        padding: '1px 6px', fontSize: '10px', fontWeight: 'bold',
      }
    }, text);
  }

  // SYSTEM 等需要反色 + 脉冲：深底亮字
  const baseStyle = style.invertBg
    ? {
        color: style.accent, background: '#0D0D0D',
        padding: '1px 6px', fontSize: '10px', fontWeight: 'bold',
        border: `1px solid ${style.accent}`,

        boxShadow: `0 0 4px ${style.accent}66`,
      };

    className: style.pulse ? 'rank-pulse' : undefined,
    style: baseStyle,
  },
    React.createElement('span', { style: { marginRight: '3px' } }, style.icon),
    text
  );
}

// Collapsible panel components

// --- CollapsibleSection: a terminal-style foldable panel ---
function CollapsibleSection({ title, icon, defaultOpen = false, children, borderColor = '#D9773E' }) {
  const [open, setOpen] = React.useState(defaultOpen);
  const [animClass, setAnimClass] = React.useState(defaultOpen ? 'panel-open' : 'panel-closed');

  const toggle = () => {
    if (open) {
      setAnimClass('panel-closing');
      setTimeout(() => { setOpen(false); setAnimClass('panel-closed'); }, 250);
    } else {
      setOpen(true);
      setAnimClass('panel-opening');
      setTimeout(() => setAnimClass('panel-open'), 20);
    }
  };

  const headerStyle = {
    display: 'flex', alignItems: 'center', gap: '8px',
    padding: '6px 10px', cursor: 'pointer', userSelect: 'none',
    color: borderColor, fontWeight: 'bold',
    borderBottom: open ? `1px solid ${borderColor}33` : 'none',
    transition: 'background 0.2s',
    background: 'transparent',
  };

  const bodyStyle = {
    overflow: 'hidden',
    maxHeight: (animClass === 'panel-open') ? '2000px' : (animClass === 'panel-opening' ? '2000px' : '0px'),
    opacity: (animClass === 'panel-open' || animClass === 'panel-opening') ? 1 : 0,
    transition: 'max-height 0.4s ease, opacity 0.3s ease',

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

  <script type="text/babel">
    const THEMES = {
      claude:  { accent: '#D9773E', name: 'Claude', glow: '#D9773E' },
      magenta: { accent: '#E05A9C', name: '品红女仆', glow: '#E05A9C' },
      green:   { accent: '#4AE04A', name: '终端绿', glow: '#4AE04A' },
    };

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "claude",
      "showBanner": true,
      "fontSize": 14,
      "maxWidth": 720
    }/*EDITMODE-END*/;

    const THEME_KEYS = Object.keys(THEMES);

    function ThemeSwitcher({ current, onCycle, accent }) {
      const themeName = THEMES[current]?.name || '';
      return React.createElement('span', {
        role: 'button',
        tabIndex: 0,
        title: `主题: ${themeName} · 点击切换`,
        onClick: (e) => { e.stopPropagation(); onCycle(); },
        onKeyDown: (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); onCycle(); }
        },
        onMouseEnter: (e) => { e.currentTarget.style.transform = 'scale(1.25)'; },
        onMouseLeave: (e) => { e.currentTarget.style.transform = 'scale(1)'; },
        style: {
          color: accent,
          textShadow: `0 0 6px ${accent}66`,
          cursor: 'pointer',
          fontSize: '14px',
          fontWeight: 'bold',
          userSelect: 'none',
          display: 'inline-block',
          lineHeight: 1,
          transition: 'color 0.2s, text-shadow 0.2s, transform 0.15s',
        },
      }, '◆');
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [data, setData] = React.useState(null);
      const theme = THEMES[tweaks.theme] || THEMES.claude;
      const accent = theme.accent;

      // 首次加载：从 MVU 抓 stat_data，失败兜底 MOCK_DATA
      React.useEffect(() => {
        let cancelled = false;
        loadData().then(d => { if (!cancelled) setData(d); });
        return () => { cancelled = true; };
      }, []);

      // MVU 变量更新事件：自动刷新视图（仅酒馆环境生效，本地预览为 no-op）
      React.useEffect(() => {
        const dispose = subscribeMvuUpdates(setData);
        return dispose;
      }, []);

      const cycleTheme = React.useCallback(() => {
        const idx = THEME_KEYS.indexOf(tweaks.theme);
        const next = THEME_KEYS[(idx + 1) % THEME_KEYS.length];
        setTweak('theme', next);
      }, [tweaks.theme, setTweak]);

      // Apply dynamic styles
      React.useEffect(() => {
        document.documentElement.style.setProperty('--accent', accent);
        document.documentElement.style.setProperty('--border', accent + '44');
        document.documentElement.style.setProperty('--accent-glow', accent + '88');
        document.documentElement.style.setProperty('--accent-faint', accent + '22');
        document.documentElement.style.fontSize = tweaks.fontSize + 'px';
      }, [accent, tweaks.fontSize]);

      // 加载占位：在拿到 data 之前显示终端联机提示
      if (!data) {
        return React.createElement('div', {
          style: {
            maxWidth: tweaks.maxWidth + 'px', margin: '0 auto',
            padding: '40px 16px', textAlign: 'center',
            color: accent, fontFamily: 'monospace', fontSize: '13px',
          }
        },
          React.createElement('div', { className: 'glow-pulse' },
            '>>> 正在连接情报终端 ...'),
          React.createElement('div', {
            style: { color: '#666', fontSize: '11px', marginTop: '8px' }
          }, '[ MVU::stat_data handshake ]')
        );
      }

      return React.createElement('div', {
        style: { maxWidth: tweaks.maxWidth + 'px', margin: '0 auto' }
      },
        // ASCII Banner
        tweaks.showBanner && React.createElement('div', {
          className: 'ascii-banner glow-pulse',
          style: { color: accent }
        }, ASCII.banner),

        // Status Bar (main collapsed entry point) — theme switcher lives in its right slot
        React.createElement(StatusBar, {
          data,
          borderColor: accent,
          rightSlot: React.createElement(ThemeSwitcher, {
            current: tweaks.theme, onCycle: cycleTheme, accent,
          }),
        }),

        // Footer
        React.createElement('div', { className: 'terminal-footer' },
          `═══ 秋叶原冥途战争 情报终端 v2.6.4 ═══`
        ),

        // Tweaks
        React.createElement(TweaksPanel, { title: '终端设置' },
          React.createElement(TweakSection, { label: '外观' }),
          React.createElement(TweakToggle, { label: '显示ASCII横幅', value: tweaks.showBanner, onChange: v => setTweak('showBanner', v) }),
          React.createElement(TweakSlider, { label: '字体大小', value: tweaks.fontSize, onChange: v => setTweak('fontSize', v), min: 10, max: 20, step: 1 }),
          React.createElement(TweakSlider, { label: '最大宽度', value: tweaks.maxWidth, onChange: v => setTweak('maxWidth', v), min: 400, max: 1200, step: 20 }),
        ),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
